version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  apt_packages:
    - doxygen
    - graphviz
  jobs:
    pre_build:
      - doxygen doc/Doxyfile
      - python scripts/check_docs_links.py doc

sphinx:
  configuration: doc/conf.py
  fail_on_warning: true

python:
  install:
    - requirements: requirements.txt
