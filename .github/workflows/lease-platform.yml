name: Lease_Platform

# CI for the subscription lease platform (feature/lease-platform).
# C++ ring + verifier deltas run under the existing ctest harness with a real
# 2-key lease ring configured; the Cloudflare lease services run their own
# node --test suites. Steps are guarded so the workflow stays green as the
# components land incrementally.

on:
  push:
    branches: [feature/lease-platform]
    paths:
      - "src/**"
      - "test/**"
      - "cmake/**"
      - "scripts/build_lease_ring.py"
      - "CMakeLists.txt"
      - "services/cloudflare-licensing-backend/**"
      - ".github/workflows/lease-platform.yml"
  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "cmake/**"
      - "services/cloudflare-licensing-backend/**"
  workflow_dispatch: {}

jobs:
  lease_services:
    name: Lease services (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "22" # node:sqlite (used by the SQL concurrency tests) needs >= 22
      - name: Backend service tests (signer + lease/seat worker)
        working-directory: services/cloudflare-licensing-backend
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            npm test --if-present
            npm run test:sql --if-present   # SQLite: rebind cap + seat-pool concurrency
            npm run schema:parity --if-present
            npm run lint --if-present
          else
            echo "backend service package.json not present yet — skipping"
          fi

  lease_cpp:
    name: C++ ring + verifier deltas (ctest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "22" # lets cmake/LeaseRing.cmake sign the cross-language lease fixture
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev libboost-test-dev libboost-system-dev libboost-filesystem-dev python3 openssl
      - name: Configure (Debug; project DEFAULT is rejected in Release; with a real 2-key lease ring)
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON -DLCC_BUILD_LEASE_RING_TEST=ON
      - name: Build
        run: cmake --build build -j2
      - name: Test (lease ring + clock floor + lease/seat client + signature/verifier)
        working-directory: build
        run: ctest -L "signature|verifier|public_api" --output-on-failure
