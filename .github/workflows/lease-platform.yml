name: Lease_Platform

# CI for the subscription lease platform (feature/lease-platform).
# C++ ring + verifier deltas run under the existing ctest harness with a real
# 2-key lease ring configured; the Cloudflare lease services run their own
# node --test suites. Steps are guarded so the workflow stays green as the
# components land incrementally.

on:
  push:
    branches: [feature/lease-platform]
    paths:
      - "src/**"
      - "test/**"
      - "cmake/**"
      - "scripts/build_lease_ring.py"
      - "CMakeLists.txt"
      - "services/cloudflare-licensing-backend/**"
      - ".github/workflows/lease-platform.yml"
  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "cmake/**"
      - "services/cloudflare-licensing-backend/**"
  workflow_dispatch: {}

jobs:
  lease_services:
    name: Lease services (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Backend service tests (signer + lease worker)
        working-directory: services/cloudflare-licensing-backend
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            npm test --if-present
          else
            echo "backend service package.json not present yet — skipping"
          fi

  lease_cpp:
    name: C++ ring + verifier deltas (ctest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev libboost-test-dev libboost-system-dev libboost-filesystem-dev python3
      - name: Configure (with a real 2-key lease ring)
        run: |
          mkdir -p build
          cd build
          # The lease ring records are generated from the checked-in manifest by
          # cmake/LeaseRing.cmake; absent a manifest this is a no-op single-key build.
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - name: Build
        run: cmake --build build --config Release -j2
      - name: Test (lease + signature + verifier labels)
        working-directory: build
        run: ctest -C Release -L "signature|verifier|public_api" --output-on-failure
