name: Cloudflare_Customer_Portal

on:
  push:
    paths:
      - ".github/workflows/cloudflare-customer-portal.yml"
      - "services/cloudflare-customer-portal/**"
      - "services/cloudflare-licensing-backend/migrations/**"
      - "services/cloudflare-licensing-backend/src/auth/**"
      - "services/cloudflare-licensing-backend/src/lease/**"
      - "services/cloudflare-licensing-backend/src/entitlements/**"
  pull_request:
    paths:
      - ".github/workflows/cloudflare-customer-portal.yml"
      - "services/cloudflare-customer-portal/**"
      - "services/cloudflare-licensing-backend/migrations/**"
      - "services/cloudflare-licensing-backend/src/auth/**"
      - "services/cloudflare-licensing-backend/src/lease/**"
      - "services/cloudflare-licensing-backend/src/entitlements/**"

permissions:
  contents: read

jobs:
  portal:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: services/cloudflare-customer-portal
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/cloudflare-customer-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Secret marker scan
        shell: bash
        working-directory: .
        run: |
          pem_begin='BEGIN'
          pem_scope='PRIVATE'
          pem_kind='KEY'
          pem_marker="${pem_begin} (RSA |EC |DSA |OPENSSH |ENCRYPTED )?${pem_scope} ${pem_kind}|${pem_begin} ${pem_scope} ${pem_kind}"
          cloudflare_token='CLOUDFLARE_API_TOKEN'
          admin_bearer='ADMIN_BEARER'
          portal_bootstrap='PORTAL_BOOTSTRAP_BEARER'
          jwt_like='[A-Za-z0-9_-]{40,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}'
          token_marker="${cloudflare_token}=|${admin_bearer}=|${portal_bootstrap}=|${jwt_like}"
          if grep -R -n -E --exclude-dir=node_modules --exclude-dir=.wrangler --exclude-dir=.online-key "$pem_marker" services/cloudflare-customer-portal .github/workflows/cloudflare-customer-portal.yml; then
            echo "PEM key marker found"
            exit 1
          fi
          if grep -R -n -E --exclude-dir=node_modules --exclude-dir=.wrangler --exclude-dir=.online-key "$token_marker" services/cloudflare-customer-portal .github/workflows/cloudflare-customer-portal.yml; then
            echo "secret-like token found"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Worker tests
        run: npm test

      - name: UI workflow tests
        run: npm run test:ui

      - name: Browser E2E tests
        run: npm run test:e2e

      - name: Dry-run deploy
        run: npm run dry-run

      - name: Apply local migrations
        run: npm run migrate:local
