name: Github_CI
on: [push, pull_request]
permissions:
   contents: read
jobs:
   build-windows:
      runs-on: ${{ matrix.os }}
      timeout-minutes: 60
      strategy:
        fail-fast: false
        matrix:
          build_type: ["Debug", "Release"]
          os: ["windows-2022"]
          static: ["true", "false"]

      steps:
      -  uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
         with:
            submodules: recursive
      -  name: Patch vendored license generator
         shell: bash
         run: gzip -dc patches/license-generator-ci.patch.gz | git -C extern/license-generator apply --ignore-whitespace -
      -  name: Install Boost (msvc 14.3 / VS2022)
         shell: pwsh
         run: |
            $boostVersion = "1.84.0"
            $boostRoot = "C:\local\boost_1_84_0"
            $installer = Join-Path $env:RUNNER_TEMP "boost_1_84_0-msvc-14.3-64.exe"
            $url = "https://sourceforge.net/projects/boost/files/boost-binaries/$boostVersion/boost_1_84_0-msvc-14.3-64.exe/download"
            $expectedSha256 = "b14090362af9730ed9cc125b456a76d981b010060ee30e6d2eb109f8144fa444"
            $downloadOk = $false
            for ($attempt = 1; $attempt -le 5; $attempt++) {
              Remove-Item -LiteralPath $installer -ErrorAction SilentlyContinue
              curl.exe -L --fail --retry 5 --retry-all-errors --retry-delay 10 -o $installer $url
              if ($LASTEXITCODE -ne 0) {
                Write-Warning "Boost download attempt $attempt failed with curl exit code $LASTEXITCODE"
                Start-Sleep -Seconds (10 * $attempt)
                continue
              }
              $actualSha256 = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLowerInvariant()
              if ($actualSha256 -eq $expectedSha256) {
                $downloadOk = $true
                break
              }
              Write-Warning "Boost download attempt $attempt SHA256 mismatch: $actualSha256"
              Start-Sleep -Seconds (10 * $attempt)
            }
            if (-not $downloadOk) {
              throw "Boost installer download failed or checksum did not match"
            }
            Start-Process -FilePath $installer -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/DIR=$boostRoot" -Wait -NoNewWindow
            if (-not (Test-Path (Join-Path $boostRoot "boost"))) {
              throw "Boost install did not create $boostRoot\boost"
            }
            "BOOST_ROOT=C:/local/boost_1_84_0" >> $env:GITHUB_ENV
      -  name: Compile
         shell: bash
         run: |
            if [ "${{ matrix.build_type }}" = "Release" ]; then
              cmake -S . -B build-keygen -A x64 \
                -DCMAKE_BUILD_TYPE=Debug \
                -DSTATIC_RUNTIME:BOOL=${{ matrix.static }} \
                -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=TRUE \
                -DLCC_PROJECT_NAME:STRING=licensecc_ci \
                -DLCC_PROJECTS_BASE_DIR="$RUNNER_TEMP/licensecc-projects" \
                -DBUILD_TESTING=OFF \
                -DLCC_BUILD_INSPECTOR=OFF
              cmake --build build-keygen --target project_initialize --config Debug
            fi
            cmake -S . -B build -A x64 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DSTATIC_RUNTIME:BOOL=${{ matrix.static }} -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=TRUE -DLCC_PROJECT_NAME:STRING=licensecc_ci -DLCC_PROJECTS_BASE_DIR="$RUNNER_TEMP/licensecc-projects" -DCMAKE_INSTALL_PREFIX=C:/licensecc
            cmake --build build --target install --config ${{ matrix.build_type }}
      -  name: Scan runtime install
         shell: bash
         run: cmake -DLCC_ARTIFACT_SCAN_ROOT=C:/licensecc -DLCC_ARTIFACT_ALLOW_TOOLS=OFF -P cmake/ScanReleaseArtifact.cmake
      -  name: Print release manifest summary
         shell: bash
         run: cmake -DLCC_RELEASE_MANIFEST_PREFIX=C:/licensecc -DLCC_RELEASE_MANIFEST_PROJECT_NAME=licensecc_ci -P cmake/PrintReleaseManifestSummary.cmake
      -  name: Test
         shell: bash
         working-directory: build
         run: ctest -C ${{ matrix.build_type }} --output-on-failure --no-tests=error
         env:
            CTEST_OUTPUT_ON_FAILURE: 1
            VIRTUAL_ENV: VM
      -  name: Security facet gates
         shell: bash
         working-directory: build
         run: |
            for label in security parser signature base64 public_api anti_tamper online generator package install platform hardware validation verifier v201; do
              echo "::group::ctest -L ${label}"
              ctest -C ${{ matrix.build_type }} -L "${label}" --output-on-failure --no-tests=error
              echo "::endgroup::"
            done
         env:
            CTEST_OUTPUT_ON_FAILURE: 1
            VIRTUAL_ENV: VM
      -  name: Signature parity report
         shell: bash
         working-directory: build
         run: ctest -C ${{ matrix.build_type }} -R test_signature_verifier --verbose --output-on-failure --no-tests=error
         env:
            CTEST_OUTPUT_ON_FAILURE: 1
            VIRTUAL_ENV: VM
      -  name: Nonzero project magic install/package smoke
         if: ${{ matrix.build_type == 'Debug' && matrix.static == 'true' }}
         shell: bash
         run: |
            cmake -S . -B build-magic -A x64 \
              -DCMAKE_BUILD_TYPE=Debug \
              -DSTATIC_RUNTIME:BOOL=true \
              -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=TRUE \
              -DLCC_PROJECT_NAME:STRING=magic_smoke \
              -DLCC_PROJECTS_BASE_DIR="$RUNNER_TEMP/licensecc-magic-projects" \
              -DLCC_PROJECT_MAGIC_NUM:STRING=123456 \
              -DCMAKE_INSTALL_PREFIX=C:/licensecc-magic
            cmake --build build-magic --target licensecc_static --config Debug
            cmake --build build-magic --target install --config Debug
            cmake -DLCC_RELEASE_MANIFEST_PREFIX=C:/licensecc-magic -DLCC_RELEASE_MANIFEST_PROJECT_NAME=magic_smoke -P cmake/PrintReleaseManifestSummary.cmake
            ctest --test-dir build-magic -C Debug -R "test_install_consumer_smoke|test_package_consumer_smoke" --output-on-failure --no-tests=error
         env:
            CTEST_OUTPUT_ON_FAILURE: 1
            VIRTUAL_ENV: VM
      -  name: Config attestation embedded-ring smoke
         if: ${{ matrix.build_type == 'Debug' && matrix.static == 'true' }}
         shell: bash
         run: |
            cmake -S . -B build-configring -A x64 \
              -DCMAKE_BUILD_TYPE=Debug \
              -DSTATIC_RUNTIME:BOOL=true \
              -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=TRUE \
              -DLCC_PROJECT_NAME:STRING=licensecc_ci \
              -DLCC_PROJECTS_BASE_DIR="$RUNNER_TEMP/licensecc-configring-projects" \
              -C test/vectors/config_attestation/embedded_golden_public_key_record.cmake.txt
            cmake --build build-configring --target test_config_attestation --config Debug
            ctest --test-dir build-configring -C Debug -R test_config_attestation --output-on-failure --no-tests=error
         env:
            CTEST_OUTPUT_ON_FAILURE: 1
            VIRTUAL_ENV: VM
      -  name: On failure print logs
         if: ${{ failure() }}
         shell: pwsh
         run: Get-Content "$env:temp/open-license.log" -ErrorAction SilentlyContinue
