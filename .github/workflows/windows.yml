name: Github_CI
on: [push, pull_request]
jobs:
   build-windows:
      runs-on: ${{ matrix.os }}
      strategy:
        fail-fast: false
        max-parallel: 1
        matrix:
          build_type: ["Debug", "Release"]
          os: ["windows-2022"]
          static: ["true", "false"]

      steps:
      -  uses: actions/checkout@v4
         with:
            submodules: recursive
      -  name: Patch vendored license generator
         shell: bash
         run: git -C extern/license-generator apply ../../patches/license-generator-cstdint.patch
      -  name: Cache Boost (msvc 14.3 / VS2022)
         id: cache-boost
         uses: actions/cache@v4
         with:
            path: C:\local\boost_1_84_0
            key: boost-msvc-14.3-1.84.0.1-windows-2022
      -  name: Install Boost (msvc 14.3 / VS2022)
         if: steps.cache-boost.outputs.cache-hit != 'true'
         shell: pwsh
         timeout-minutes: 20
         run: |
            $boostVersion = "1.84.0"
            $boostRoot = "C:\local\boost_1_84_0"
            $installer = Join-Path $env:RUNNER_TEMP "boost_1_84_0-msvc-14.3-64.exe"
            $url = "https://archives.boost.io/release/$boostVersion/binaries/boost_1_84_0-msvc-14.3-64.exe"
            $expectedSha256 = "b14090362af9730ed9cc125b456a76d981b010060ee30e6d2eb109f8144fa444"
            curl.exe -L --fail --retry 3 --retry-all-errors --retry-delay 10 --connect-timeout 30 --max-time 600 -o $installer $url
            if ($LASTEXITCODE -ne 0) {
              throw "Boost download failed with curl exit code $LASTEXITCODE"
            }
            $actualSha256 = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLowerInvariant()
            if ($actualSha256 -ne $expectedSha256) {
              throw "Boost installer SHA256 mismatch: $actualSha256"
            }
            $process = Start-Process -FilePath $installer -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/DIR=$boostRoot" -PassThru -WindowStyle Hidden
            if (-not $process.WaitForExit(600000)) {
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
              throw "Boost installer timed out"
            }
            if ($process.ExitCode -ne 0) {
              throw "Boost installer failed with exit code $($process.ExitCode)"
            }
            if (-not (Test-Path (Join-Path $boostRoot "boost"))) {
              throw "Boost install did not create $boostRoot\boost"
            }
      -  name: Export Boost root
         shell: pwsh
         run: |
            $boostRoot = "C:\local\boost_1_84_0"
            if (-not (Test-Path (Join-Path $boostRoot "boost"))) {
              throw "Boost install missing at $boostRoot"
            }
            "BOOST_ROOT=C:/local/boost_1_84_0" >> $env:GITHUB_ENV
      -  name: Compile
         shell: bash
         run: |
            cmake -S . -B build -A x64 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DSTATIC_RUNTIME:BOOL=${{ matrix.static }} -DLCC_PROJECT_NAME:STRING=test -DCMAKE_INSTALL_PREFIX=C:/licensecc
            cmake --build build --target install --config ${{ matrix.build_type }}
      -  name: Test
         shell: bash
         working-directory: build
         run: ctest -C ${{ matrix.build_type }}
         env:
            CTEST_OUTPUT_ON_FAILURE: 1
            VIRTUAL_ENV: VM
      -  name: Inspector
         shell: bash
         run: C:/licensecc/bin/test/lccinspector.exe
      -  name: On failure print logs
         if: ${{ failure() }}
         shell: pwsh
         run: Get-Content "$env:temp/open-license.log" -ErrorAction SilentlyContinue
