name: Github_CI
on: [push, pull_request]
jobs:
   build-windows:
      runs-on: ${{ matrix.os }}
      strategy:
        fail-fast: false
        matrix:
          build_type: ["Debug", "Release"]
          os: ["windows-2022"]
          static: ["true", "false"]

      steps:
      -  uses: actions/checkout@v4
         with:
            submodules: recursive
      -  name: Patch vendored license generator
         shell: bash
         run: git -C extern/license-generator apply ../../patches/license-generator-cstdint.patch
      -  name: Install Boost (msvc 14.3 / VS2022)
         shell: pwsh
         run: |
            $boostVersion = "1.84.0"
            $boostRoot = "C:\local\boost_1_84_0"
            $installer = Join-Path $env:RUNNER_TEMP "boost_1_84_0-msvc-14.3-64.exe"
            $url = "https://sourceforge.net/projects/boost/files/boost-binaries/$boostVersion/boost_1_84_0-msvc-14.3-64.exe/download"
            $expectedSha256 = "b14090362af9730ed9cc125b456a76d981b010060ee30e6d2eb109f8144fa444"
            $downloadOk = $false
            for ($attempt = 1; $attempt -le 5; $attempt++) {
              Remove-Item -LiteralPath $installer -ErrorAction SilentlyContinue
              curl.exe -L --fail --retry 5 --retry-all-errors --retry-delay 10 -o $installer $url
              if ($LASTEXITCODE -ne 0) {
                Write-Warning "Boost download attempt $attempt failed with curl exit code $LASTEXITCODE"
                Start-Sleep -Seconds (10 * $attempt)
                continue
              }
              $actualSha256 = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLowerInvariant()
              if ($actualSha256 -eq $expectedSha256) {
                $downloadOk = $true
                break
              }
              Write-Warning "Boost download attempt $attempt SHA256 mismatch: $actualSha256"
              Start-Sleep -Seconds (10 * $attempt)
            }
            if (-not $downloadOk) {
              throw "Boost installer download failed or checksum did not match"
            }
            Start-Process -FilePath $installer -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/DIR=$boostRoot" -Wait -NoNewWindow
            if (-not (Test-Path (Join-Path $boostRoot "boost"))) {
              throw "Boost install did not create $boostRoot\boost"
            }
            "BOOST_ROOT=C:/local/boost_1_84_0" >> $env:GITHUB_ENV
      -  name: Compile
         shell: bash
         run: |
            cmake -S . -B build -A x64 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DSTATIC_RUNTIME:BOOL=${{ matrix.static }} -DLCC_PROJECT_NAME:STRING=test -DCMAKE_INSTALL_PREFIX=C:/licensecc
            cmake --build build --target install --config ${{ matrix.build_type }}
      -  name: Test
         shell: bash
         working-directory: build
         run: ctest -C ${{ matrix.build_type }}
         env:
            CTEST_OUTPUT_ON_FAILURE: 1
            VIRTUAL_ENV: VM
      -  name: Inspector
         shell: bash
         run: C:/licensecc/bin/test/lccinspector.exe
      -  name: On failure print logs
         if: ${{ failure() }}
         shell: pwsh
         run: Get-Content "$env:temp/open-license.log" -ErrorAction SilentlyContinue
