name: Cloudflare_Licensing_Backend

on:
  push:
    paths:
      - ".github/workflows/cloudflare-licensing-backend.yml"
      - "services/cloudflare-licensing-backend/**"
      - "doc/analysis/license-admin-vite-react*.rst"
      - "doc/analysis/online-verification-implementation-checklist.rst"
  pull_request:
    paths:
      - ".github/workflows/cloudflare-licensing-backend.yml"
      - "services/cloudflare-licensing-backend/**"
      - "doc/analysis/license-admin-vite-react*.rst"
      - "doc/analysis/online-verification-implementation-checklist.rst"

permissions:
  contents: read

jobs:
  verifier:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: services/cloudflare-licensing-backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/cloudflare-licensing-backend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: npm ci

      - name: Secret marker scan
        shell: bash
        working-directory: .
        run: |
          pem_begin='BEGIN'
          pem_scope='PRIVATE'
          pem_kind='KEY'
          pem_marker="${pem_begin} (RSA |EC |DSA |OPENSSH |ENCRYPTED )?${pem_scope} ${pem_kind}|${pem_begin} ${pem_scope} ${pem_kind}"
          cloudflare_token='CLOUDFLARE_API_TOKEN'
          admin_bearer='ADMIN_BEARER'
          jwt_like='[A-Za-z0-9_-]{40,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}'
          token_marker="${cloudflare_token}=|${admin_bearer}=|${jwt_like}"
          if grep -R -n -E --exclude-dir=node_modules --exclude-dir=.wrangler --exclude-dir=.online-key "$pem_marker" services/cloudflare-licensing-backend .github/workflows/cloudflare-licensing-backend.yml; then
            echo "PEM key marker found"
            exit 1
          fi
          if grep -R -n -E --exclude-dir=node_modules --exclude-dir=.wrangler --exclude-dir=.online-key "$token_marker" services/cloudflare-licensing-backend .github/workflows/cloudflare-licensing-backend.yml; then
            echo "secret-like token found"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: DB conformance tests
        run: npm run test:db

      - name: SQL tests
        run: npm run test:sql

      - name: Worker-boundary E2E tests
        run: npm run test:e2e

      - name: Postgres adapter tests
        run: npm run test:pg

      - name: Check schema parity
        run: npm run schema:parity

      - name: Check Postgres schema parity
        run: npm run schema:parity:pg

      - name: Dry-run deploy
        run: npm run dry-run

      - name: Apply local migrations
        run: npm run migrate:local
