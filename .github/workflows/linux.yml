name: Linux_CI
on: [push, pull_request]
jobs:
   build-linux:
      runs-on: ubuntu-latest
      strategy:
        fail-fast: false
        matrix:
          preset: ["ci-linux-debug", "ci-linux-release"]

      steps:
      -  uses: actions/checkout@v4
         with:
            submodules: recursive
      -  name: Install dependencies
         run: |
            sudo apt-get update
            sudo apt-get install -y cmake libssl-dev zlib1g-dev \
              libboost-dev libboost-test-dev libboost-filesystem-dev \
              libboost-iostreams-dev libboost-program-options-dev \
              libboost-system-dev libboost-thread-dev libboost-date-time-dev \
              valgrind
      -  name: Core check
         run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/dev-check.ps1 -Preset ${{ matrix.preset }}
      -  name: On failure print logs
         if: ${{ failure() }}
         run: cat /tmp/open-license.log || true
